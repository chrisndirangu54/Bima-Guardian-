# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Dart

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Opt into Node.js 24 for JavaScript-based actions (fixes Node.js 20 deprecation)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      # Use the official setup-dart action (version tag) to ensure compatibility
      - uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        working-directory: my_app
        run: dart pub get

      # Uncomment this step to verify the use of 'dart format' on each commit.
      # - name: Verify formatting
      #   working-directory: my_app
      #   run: dart format --output=none --set-exit-if-changed .

      # Consider passing '--fatal-infos' for slightly stricter analysis.
      - name: Analyze project source
        working-directory: my_app
        run: dart analyze

      # Run unit tests for models and services
      - name: Run unit tests
        working-directory: my_app
        run: dart test test/models/
